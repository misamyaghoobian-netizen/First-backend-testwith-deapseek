<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>آزمون ریاضی دهم تجربی | ذخیره خودکار در گوگل</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Tahoma', 'Segoe UI', 'Vazir', sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #e9edf2 100%); color: #1e2a3e; line-height: 1.5; overflow-x: hidden; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 16px 40px; }
        .info-bar { background: #ffffffdd; backdrop-filter: blur(10px); border-radius: 28px; padding: 12px 18px; margin-bottom: 20px; display: flex; flex-wrap: wrap; justify-content: space-between; align-items: baseline; gap: 10px; }
        .teacher-info { font-size: 0.9rem; color: #2c3e66; }
        .timer-area { background: #1e2a3e; color: #facc15; padding: 8px 16px; border-radius: 40px; font-family: monospace; font-size: 1.3rem; font-weight: bold; }
        .progress-section { margin-bottom: 20px; }
        .progress-bar-container { background-color: #cbd5e1; border-radius: 20px; height: 12px; overflow: hidden; }
        .progress-fill { background-color: #10b981; width: 0%; height: 100%; transition: width 0.3s ease; }
        .question-counter { display: flex; justify-content: space-between; margin-top: 6px; font-size: 0.8rem; color: #475569; }
        .question-card { background: white; border-radius: 32px; padding: 24px 20px; margin-bottom: 24px; box-shadow: 0 12px 24px -12px rgba(0,0,0,0.2); }
        .question-text { font-size: 1.3rem; font-weight: 700; margin-bottom: 24px; background: #f1f5f9; padding: 16px; border-radius: 24px; }
        .options { display: flex; flex-direction: column; gap: 14px; margin-bottom: 30px; }
        .option { display: flex; align-items: center; gap: 12px; background: #f8fafc; padding: 12px 16px; border-radius: 60px; border: 1px solid #e2e8f0; cursor: pointer; }
        .option:hover { background: #eef2ff; border-color: #818cf8; }
        input[type="radio"] { width: 20px; height: 20px; cursor: pointer; accent-color: #3b82f6; }
        .option label { flex: 1; cursor: pointer; font-size: 1rem; }
        .nav-buttons { display: flex; justify-content: space-between; gap: 16px; margin-top: 10px; }
        button { background-color: #3b82f6; border: none; color: white; padding: 14px 24px; border-radius: 60px; font-size: 1rem; font-weight: bold; cursor: pointer; transition: all 0.2s; min-width: 120px; min-height: 48px; }
        button:hover { background-color: #2563eb; transform: scale(0.97); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; }
        .submit-btn { background-color: #059669; width: 100%; margin-top: 20px; }
        .register-box { background: white; border-radius: 40px; padding: 30px 20px; text-align: center; box-shadow: 0 20px 30px -10px rgba(0,0,0,0.1); }
        .register-box input { width: 100%; padding: 14px 16px; margin: 12px 0; border-radius: 60px; border: 1px solid #cbd5e1; font-size: 1rem; }
        .error-msg { color: #dc2626; font-size: 0.8rem; margin-top: 8px; }
        .result-card { background: white; border-radius: 32px; padding: 28px; text-align: center; }
        .score { font-size: 2.8rem; font-weight: 800; color: #3b82f6; margin: 20px 0; }
        footer { margin-top: 30px; text-align: center; font-size: 0.7rem; color: #64748b; }
        @media (max-width: 480px) { .container { padding: 12px; } .question-text { font-size: 1.1rem; } .option label { font-size: 0.85rem; } button { padding: 12px 18px; min-width: 100px; } .timer-area { font-size: 1rem; } }
        @media (max-width: 768px) { .info-bar { flex-direction: column; align-items: stretch; } }
    </style>
</head>
