<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>آزمون ریاضی و آمار ۱ | پایه دهم انسانی</title>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js" id="MathJax-script" async></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Tahoma', 'Segoe UI', 'Vazir', sans-serif;
            background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            color: #0f172a;
            line-height: 1.5;
            overflow-x: hidden;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px 16px 40px; }
        .info-bar {
            background: rgba(255,255,255,0.9);
            backdrop-filter: blur(8px);
            border-radius: 32px;
            padding: 12px 20px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: baseline;
            gap: 12px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
            border: 1px solid rgba(255,255,255,0.5);
        }
        .teacher-info { font-size: 0.85rem; color: #1e3a8a; font-weight: 500; }
        .timer-area {
            background: #0f172a;
            color: #facc15;
            padding: 6px 16px;
            border-radius: 40px;
            font-family: monospace;
            font-size: 1.2rem;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .progress-section { margin-bottom: 20px; }
        .progress-bar-container {
            background-color: #cbd5e1;
            border-radius: 20px;
            height: 12px;
            overflow: hidden;
        }
        .progress-fill {
            background-color: #3b82f6;
            width: 0%;
            height: 100%;
            transition: width 0.2s ease;
        }
        .question-counter {
            display: flex;
            justify-content: space-between;
            margin-top: 8px;
            font-size: 0.8rem;
            color: #334155;
        }
        .question-card {
            background: white;
            border-radius: 36px;
            padding: 28px 20px;
            margin-bottom: 24px;
            box-shadow: 0 12px 28px -12px rgba(0,0,0,0.2);
            border: 1px solid #e2e8f0;
        }
        .question-text {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 24px;
            background: #f1f5f9;
            padding: 18px;
            border-radius: 28px;
            line-height: 1.6;
        }
        .options {
            display: flex;
            flex-direction: column;
            gap: 14px;
            margin-bottom: 30px;
        }
        .option {
            display: flex;
            align-items: center;
            gap: 14px;
            background: #f8fafc;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid #e2e8f0;
            transition: all 0.2s;
            cursor: pointer;
        }
        .option:hover {
            background: #eef2ff;
            border-color: #3b82f6;
        }
        input[type="radio"] {
            width: 20px;
            height: 20px;
            cursor: pointer;
            accent-color: #3b82f6;
        }
        .option label {
            flex: 1;
            cursor: pointer;
            font-size: 0.95rem;
            font-weight: 500;
        }
        .badge-weight {
            background: #eab308;
            color: #1e293b;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 0.7rem;
            margin-right: 12px;
            font-weight: bold;
        }
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            margin-top: 10px;
        }
        button {
            background-color: #3b82f6;
            border: none;
            color: white;
            padding: 14px 24px;
            border-radius: 60px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            min-width: 120px;
            min-height: 48px;
        }
        button:hover { background-color: #2563eb; transform: scale(0.97); }
        button:disabled { background-color: #94a3b8; cursor: not-allowed; transform: none; }
        .submit-btn { background-color: #059669; width: 100%; margin-top: 20px; }
        .register-box {
            background: white;
            border-radius: 40px;
            padding: 34px 24px;
            text-align: center;
            box-shadow: 0 20px 35px -12px rgba(0,0,0,0.15);
        }
        .register-box input {
            width: 100%;
            padding: 14px 18px;
            margin: 12px 0;
            border-radius: 60px;
            border: 1px solid #cbd5e1;
            font-size: 1rem;
            font-family: inherit;
        }
        .error-msg { color: #dc2626; font-size: 0.8rem; margin-top: 8px; }
        .result-card {
            background: white;
            border-radius: 36px;
            padding: 30px 20px;
            text-align: center;
        }
        .score {
            font-size: 2.8rem;
            font-weight: 800;
            color: #2563eb;
            margin: 20px 0;
        }
        footer {
            margin-top: 30px;
            text-align: center;
            font-size: 0.7rem;
            color: #475569;
        }
        @media (max-width: 480px) {
            .container { padding: 12px; }
            .question-text { font-size: 1rem; }
            .option label { font-size: 0.85rem; }
            button { padding: 10px 18px; min-width: 100px; }
            .timer-area { font-size: 1rem; }
        }
        @media (max-width: 768px) {
            .info-bar { flex-direction: column; align-items: stretch; }
        }
        .shuffle-option {
            margin-top: 12px;
            display: flex;
            align-items: center;
            gap: 12px;
            justify-content: center;
        }
    </style>
</head>
<body>
<div class="container" id="app"></div>

<script>
    // ======================= ۲۰ سوال اصلی (بر اساس کتاب ریاضی و آمار ۱) =======================
    // هر سوال شامل متن، گزینه‌ها، پاسخ صحیح (شاخص ۰ تا ۳)، وزن (نمره) = ۱، فصل مربوطه
    const MASTER_QUESTIONS = [
        { text: "معادله \\(2x + 3 = 7\\) را حل کنید.", options: ["1", "2", "3", "4"], correct: 1, weight: 1, chapter: 1 },
        { text: "ریشه‌های معادله \\(x^2 - 5x + 6 = 0\\) کدامند؟", options: ["2 و 3", "2 و -3", "-2 و 3", "-2 و -3"], correct: 0, weight: 1, chapter: 1 },
        { text: "در معادله \\(ax^2 + bx + c = 0\\)، اگر \\(\\Delta = b^2 - 4ac\\) مثبت باشد، معادله چند ریشه حقیقی دارد؟", options: ["0", "1", "2", "3"], correct: 2, weight: 1, chapter: 1 },
        { text: "کدام یک از روابط زیر یک تابع است؟", options: ["{(1,2), (1,3)}", "{(2,3), (3,3)}", "{(1,2), (2,2), (1,3)}", "{(1,4), (1,5)}"], correct: 1, weight: 1, chapter: 2 },
        { text: "ضابطه تابع خطی که از نقاط \\((0,0)\\) و \\((1,2)\\) می‌گذرد، کدام است؟", options: ["\\(y = 2x\\)", "\\(y = x+2\\)", "\\(y = 2x+1\\)", "\\(y = x\\)"], correct: 0, weight: 1, chapter: 2 },
        { text: "نمودار تابع \\(y = x^2\\) چه شکلی است؟", options: ["خط راست", "سهمی رو به بالا", "سهمی رو به پایین", "دایره"], correct: 1, weight: 1, chapter: 2 },
        { text: "دامنه تابع \\(f(x) = \\frac{1}{x-2}\\) کدام است؟", options: ["همه اعداد حقیقی", "همه اعداد به جز 2", "همه اعداد به جز -2", "\\(x > 2\\)"], correct: 1, weight: 1, chapter: 2 },
        { text: "اگر \\(f(x) = 3x - 4\\) باشد، مقدار \\(f(2)\\) کدام است؟", options: ["2", "3", "0", "1"], correct: 0, weight: 1, chapter: 2 },
        { text: "کدام روش برای گردآوری داده‌های «تعداد خودروهای عبوری از یک تقاطع» مناسب است؟", options: ["پرسش‌نامه", "مصاحبه", "مشاهده", "آزمایش"], correct: 2, weight: 1, chapter: 3 },
        { text: "میانگین اعداد 10، 20، 30، 40، 50 کدام است؟", options: ["25", "30", "35", "40"], correct: 1, weight: 1, chapter: 3 },
        { text: "کدام معیار گرایش به مرکز تحت تأثیر داده‌های دورافتاده قرار نمی‌گیرد؟", options: ["میانگین", "میانه", "دامنه", "واریانس"], correct: 1, weight: 1, chapter: 3 },
        { text: "در مجموعه داده‌های \\(\\{5, 7, 9, 11, 13\\}\\)، میانه کدام است؟", options: ["5", "7", "9", "11"], correct: 2, weight: 1, chapter: 3 },
        { text: "انحراف معیار داده‌های \\(\\{10, 10, 10, 10\\}\\) چند است؟", options: ["10", "5", "0", "1"], correct: 2, weight: 1, chapter: 3 },
        { text: "دامنه تغییرات داده‌های \\(\\{2, 8, 15, 3, 20\\}\\) کدام است？", options: ["15", "18", "20", "22"], correct: 1, weight: 1, chapter: 3 },
        { text: "اگر میانگین داده‌های \\(\\{x, 10, 15\\}\\) برابر 15 باشد، مقدار \\(x\\) کدام است؟", options: ["10", "15", "20", "25"], correct: 2, weight: 1, chapter: 3 },
        { text: "کدام نمودار برای نمایش درصد اجزای یک کل مناسب‌تر است؟", options: ["نمودار میله‌ای", "نمودار دایره‌ای", "نمودار جعبه‌ای", "نمودار حبابی"], correct: 1, weight: 1, chapter: 4 },
        { text: "در نمودار جعبه‌ای، چه چیزی نشان داده نمی‌شود؟", options: ["میانه", "دامنه میان‌چارکی", "میانگین", "چارک اول و سوم"], correct: 2, weight: 1, chapter: 4 },
        { text: "کدام نمودار برای مقایسه سه متغیر عددی به طور همزمان مناسب است؟", options: ["نمودار میله‌ای", "نمودار دایره‌ای", "نمودار حبابی", "نمودار نقطه‌ای"], correct: 2, weight: 1, chapter: 4 },
        { text: "در نمودار راداری، هر شعاع نشان‌دهنده چیست؟", options: ["یک مشاهده", "یک متغیر", "یک داده دورافتاده", "دامنه تغییرات"], correct: 1, weight: 1, chapter: 4 },
        { text: "کدام یک از موارد زیر متغیر کیفی است؟", options: ["قد", "وزن", "رنگ چشم", "سن"], correct: 2, weight: 1, chapter: 4 }
    ];

    // کلیدهای ذخیره‌سازی در localStorage
    const STORAGE_KEY_STARTED = "mathStats_exam_started";
    const STORAGE_KEY_STUDENT = "mathStats_exam_student";
    const STORAGE_KEY_ANSWERS = "mathStats_exam_answers";
    const STORAGE_KEY_FINISHED = "mathStats_exam_finished";
    const STORAGE_KEY_FINISH_TIME = "mathStats_exam_finish_time";
    const STORAGE_KEY_RANDOMIZED_QS = "mathStats_randomized_questions";
    const STORAGE_KEY_SHUFFLE = "mathStats_shuffle_enabled";

    let currentQ = 0;
    let studentInfo = null;
    let answers = [];
    let examFinished = false;
    let finishTimestamp = null;
    let timerInterval = null;
    let timeLeft = 30 * 60;        // ۳۰ دقیقه
    let QUESTIONS = [];            // ترتیب نهایی سوالات (تصادفی یا اصلی)
    let shuffleEnabled = true;     // آیا سوالات تصادفی شوند؟

    const app = document.getElementById("app");

    // ======================= توابع کمکی =======================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // محاسبه مجموع نمرات کل (بر اساس وزن هر سوال)
    function calcTotalWeight(questions) {
        return questions.reduce((sum, q) => sum + (q.weight || 1), 0);
    }

    // ذخیره وضعیت در localStorage
    function saveToLocal() {
        if (studentInfo) localStorage.setItem(STORAGE_KEY_STUDENT, JSON.stringify(studentInfo));
        localStorage.setItem(STORAGE_KEY_ANSWERS, JSON.stringify(answers));
        if (QUESTIONS.length) localStorage.setItem(STORAGE_KEY_RANDOMIZED_QS, JSON.stringify(QUESTIONS));
        localStorage.setItem(STORAGE_KEY_SHUFFLE, shuffleEnabled);
    }

    function loadFromLocal() {
        const storedStudent = localStorage.getItem(STORAGE_KEY_STUDENT);
        if (storedStudent) studentInfo = JSON.parse(storedStudent);
        const storedAnswers = localStorage.getItem(STORAGE_KEY_ANSWERS);
        if (storedAnswers) answers = JSON.parse(storedAnswers);
        const storedQuestions = localStorage.getItem(STORAGE_KEY_RANDOMIZED_QS);
        if (storedQuestions) {
            QUESTIONS = JSON.parse(storedQuestions);
        } else {
            QUESTIONS = [...MASTER_QUESTIONS];
        }
        const storedShuffle = localStorage.getItem(STORAGE_KEY_SHUFFLE);
        if (storedShuffle !== null) shuffleEnabled = storedShuffle === "true";
        const finishedFlag = localStorage.getItem(STORAGE_KEY_FINISHED);
        if (finishedFlag === "true") examFinished = true;
        const ft = localStorage.getItem(STORAGE_KEY_FINISH_TIME);
        if (ft) finishTimestamp = parseInt(ft);
    }

    // محاسبه نمره کسب شده بر اساس وزن سوالات
    function computeScore() {
        let earned = 0;
        for (let i = 0; i < QUESTIONS.length; i++) {
            if (answers[i] !== null && answers[i] === QUESTIONS[i].correct) {
                earned += (QUESTIONS[i].weight || 1);
            }
        }
        return earned;
    }

    // اطلاعات خودکار مرورگر و دستگاه
    function getAutoInfo() {
        try {
            function getDeviceType() {
                const ua = navigator.userAgent;
                if (/(tablet|ipad|playbook|silk)|(android(?!.*mobi))/i.test(ua)) return "تبلت";
                if (/Mobile|iPod|iPhone|Android|BlackBerry|Opera Mini|IEMobile/i.test(ua)) return "موبایل";
                return "دسکتاپ";
            }
            return {
                userAgent: navigator.userAgent || "نامشخص",
                language: navigator.language || "نامشخص",
                screenWidth: screen.width || 0,
                screenHeight: screen.height || 0,
                viewportWidth: window.innerWidth || 0,
                viewportHeight: window.innerHeight || 0,
                deviceType: getDeviceType(),
                online: navigator.onLine !== undefined ? navigator.onLine : true,
                cookieEnabled: navigator.cookieEnabled !== undefined ? navigator.cookieEnabled : false,
                timeZone: Intl.DateTimeFormat().resolvedOptions().timeZone || "نامشخص",
                hardwareConcurrency: navigator.hardwareConcurrency || "نامشخص"
            };
        } catch(e) { return {}; }
    }

    // ======================= ذخیره در گوگل درایو (نیازمند تنظیم لینک) =======================
    // ⚠️ کاربر عزیز: برای ذخیره خودکار نتایج در Google Sheet، لطفاً لینک Web App خود را در آدرس زیر قرار دهید.
    // راهنما: یک Apps Script با کد doPost ایجاد کنید و آن را به عنوان Web App (دسترسی Anyone) منتشر کنید.
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwvqQRmdrm3wirtInov5GePa6uUzcrRo82KXH1NpVgBgjC5BlfimOpTpWoYsolU64IX/exec";  // <--- لینک خود را اینجا وارد کنید

    async function saveToGoogleDrive(student, earnedScore, answersList, startTime, endTime) {
        if (!student) return;
        if (GOOGLE_SCRIPT_URL.includes("YOUR_SCRIPT_ID")) {
            console.warn("⚠️ لینک Google Apps Script تنظیم نشده است. داده فقط در مرورگر ذخیره شد.");
            return;
        }
        const auto = getAutoInfo();
        const payload = {
            name: student.name,
            family: student.family,
            classNumber: student.classNumber,
            studentCode: student.studentCode,
            earnedScore: earnedScore,
            maxScore: calcTotalWeight(QUESTIONS),
            answers: answersList,
            timestamp: new Date().toISOString(),
            ...auto,
            startTime: startTime || "",
            endTime: endTime || "",
            durationSeconds: (startTime && endTime) ? (parseInt(endTime) - parseInt(startTime)) / 1000 : ""
        };
        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
            console.log("✅ نتایج با موفقیت به Google Drive ارسال شد.");
        } catch(e) {
            console.error("❌ خطا در ارسال به Google Drive:", e);
        }
    }

    // آیا می‌توان پاسخ‌های صحیح را نشان داد؟ (یک ساعت پس از پایان آزمون)
    function canShowAnswers() {
        if (!examFinished || !finishTimestamp) return false;
        const oneHour = 60 * 60 * 1000;
        return (Date.now() - finishTimestamp) >= oneHour;
    }

    // ======================= صفحه ثبت نام (ورود اطلاعات و انتخاب تصادفی) =======================
    function renderRegister() {
        app.innerHTML = `
            <div class="register-box">
                <h2>📊 آزمون ریاضی و آمار ۱</h2>
                <p style="margin:10px 0">پایه دهم | رشته علوم انسانی و معارف اسلامی</p>
                <p style="margin:12px 0">بسم الله الرحمن الرحیم</p>
                <p>لطفاً اطلاعات خود را وارد کنید</p>
                <div style="text-align:right">
                    <input type="text" id="name" placeholder="نام" autocomplete="off">
                    <input type="text" id="family" placeholder="نام خانوادگی">
                    <input type="text" id="classNum" placeholder="شماره کلاس">
                    <input type="text" id="studentCode" placeholder="کد دانش‌آموزی">
                </div>
                <div class="shuffle-option">
                    <label><input type="checkbox" id="shuffleCheckbox" ${shuffleEnabled ? 'checked' : ''}> ترتیب تصادفی سوالات (پیش‌فرض فعال)</label>
                </div>
                <button id="startExamBtn">شروع آزمون (۳۰ دقیقه)</button>
                <div id="regError" class="error-msg"></div>
            </div>
        `;
        document.getElementById("shuffleCheckbox").addEventListener("change", (e) => {
            shuffleEnabled = e.target.checked;
            localStorage.setItem(STORAGE_KEY_SHUFFLE, shuffleEnabled);
        });
        document.getElementById("startExamBtn").addEventListener("click", () => {
            const name = document.getElementById("name").value.trim();
            const family = document.getElementById("family").value.trim();
            const classNum = document.getElementById("classNum").value.trim();
            const studentCode = document.getElementById("studentCode").value.trim();
            if (!name || !family || !classNum || !studentCode) {
                document.getElementById("regError").innerText = "تمامی فیلدها الزامی است";
                return;
            }
            studentInfo = { name, family, classNumber: classNum, studentCode };
            localStorage.setItem(STORAGE_KEY_STARTED, "true");
            localStorage.setItem("exam_start_time", Date.now().toString());
            // ساخت آرایه نهایی سوالات بر اساس گزینه تصادفی
            let baseArray = [...MASTER_QUESTIONS];
            if (shuffleEnabled) {
                baseArray = shuffleArray(baseArray);
            }
            QUESTIONS = baseArray;
            answers = new Array(QUESTIONS.length).fill(null);
            saveToLocal();
            startExam();
        });
    }

    // ======================= شروع آزمون و تایمر =======================
    function startExam() {
        const startTime = parseInt(localStorage.getItem("exam_start_time"));
        const elapsed = Math.floor((Date.now() - startTime) / 1000);
        timeLeft = Math.max(0, 30*60 - elapsed);
        if (timeLeft <= 0) {
            endExam();
            return;
        }
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            if (examFinished) return;
            if (timeLeft <= 1) {
                clearInterval(timerInterval);
                endExam();
            } else {
                timeLeft--;
                localStorage.setItem("exam_time_left", timeLeft);
                renderQuestion();
            }
        }, 1000);
        renderQuestion();
    }

    // نمایش هر سوال در صفحه جداگانه
    function renderQuestion() {
        if (examFinished) { renderResult(); return; }
        if (!studentInfo || !QUESTIONS.length) { renderRegister(); return; }
        const q = QUESTIONS[currentQ];
        const selectedIndex = answers[currentQ];
        const minutes = Math.floor(timeLeft / 60);
        const seconds = timeLeft % 60;
        const progressPercent = ((currentQ+1)/QUESTIONS.length)*100;

        let optionsHtml = '';
        q.options.forEach((opt, idx) => {
            const checked = (selectedIndex === idx) ? 'checked' : '';
            optionsHtml += `
                <div class="option" data-val="${idx}">
                    <input type="radio" name="q_option" id="opt_${idx}" value="${idx}" ${checked}>
                    <label for="opt_${idx}">${String.fromCharCode(65+idx)} - ${opt}</label>
                </div>
            `;
        });

        const html = `
            <div class="info-bar">
                <div class="teacher-info">📚 دبیر: میثم یعقوبیان | دبیرستان غدیر | پایه دهم انسانی</div>
                <div class="timer-area">⏱️ زمان باقی: ${minutes.toString().padStart(2,'0')}:${seconds.toString().padStart(2,'0')}</div>
            </div>
            <div class="progress-section">
                <div class="progress-bar-container"><div class="progress-fill" style="width: ${progressPercent}%"></div></div>
                <div class="question-counter">سوال ${currentQ+1} از ${QUESTIONS.length} (فصل ${q.chapter} | وزن: ${q.weight})</div>
            </div>
            <div class="question-card">
                <div class="question-text">❓ ${q.text} <span class="badge-weight">${q.weight} نمره</span></div>
                <div class="options" id="optionsContainer">${optionsHtml}</div>
                <div class="nav-buttons">
                    <button id="prevBtn" ${currentQ===0 ? 'disabled' : ''}>قبلی</button>
                    <button id="nextBtn">بعدی</button>
                </div>
                ${currentQ === QUESTIONS.length-1 ? '<button id="finishExamBtn" class="submit-btn">پایان آزمون و مشاهده نتیجه</button>' : ''}
            </div>
        `;
        app.innerHTML = html;

        // ثبت تغییرات گزینه‌ها
        document.querySelectorAll('.option').forEach(opt => {
            const radio = opt.querySelector('input[type="radio"]');
            if (radio) {
                radio.addEventListener('change', () => {
                    answers[currentQ] = parseInt(opt.dataset.val);
                    saveToLocal();
                });
            }
            opt.addEventListener('click', () => {
                const radio = opt.querySelector('input[type="radio"]');
                if (radio && !radio.checked) {
                    radio.checked = true;
                    answers[currentQ] = parseInt(opt.dataset.val);
                    saveToLocal();
                }
            });
        });

        document.getElementById("prevBtn")?.addEventListener("click", () => {
            if (currentQ > 0) { currentQ--; renderQuestion(); }
        });
        document.getElementById("nextBtn")?.addEventListener("click", () => {
            if (currentQ < QUESTIONS.length-1) { currentQ++; renderQuestion(); }
        });
        const finishBtn = document.getElementById("finishExamBtn");
        if (finishBtn) {
            finishBtn.addEventListener("click", () => {
                if (confirm("آیا برای پایان آزمون و مشاهده نتیجه اطمینان دارید؟")) {
                    endExam();
                }
            });
        }
        if (window.MathJax) MathJax.typesetPromise();
    }

    // پایان آزمون: ذخیره خودکار در گوگل درایو و نمایش نتیجه
    function endExam() {
        if (examFinished) return;
        examFinished = true;
        finishTimestamp = Date.now();
        localStorage.setItem(STORAGE_KEY_FINISHED, "true");
        localStorage.setItem(STORAGE_KEY_FINISH_TIME, finishTimestamp.toString());
        if (timerInterval) clearInterval(timerInterval);

        const startTime = localStorage.getItem("exam_start_time");
        const endTime = Date.now().toString();
        if (studentInfo) {
            const earned = computeScore();
            saveToGoogleDrive(studentInfo, earned, answers, startTime, endTime);
        }
        renderResult();
    }

    // نمایش نتیجه نهایی (نمره و پس از یک ساعت پاسخ‌های صحیح)
    function renderResult() {
        const earned = computeScore();
        const totalWeight = calcTotalWeight(QUESTIONS);
        const canShow = canShowAnswers();

        let answersTable = '';
        if (canShow) {
            answersTable = '<div style="margin-top:20px; text-align:right; background:#f1f5f9; padding:16px; border-radius:24px;"><h4>✅ پاسخ صحیح سوالات:</h4>';
            for (let i=0; i<QUESTIONS.length; i++) {
                const correctText = QUESTIONS[i].options[QUESTIONS[i].correct];
                answersTable += `<p><strong>سوال ${i+1} (فصل ${QUESTIONS[i].chapter} | وزن ${QUESTIONS[i].weight}):</strong> ${correctText}</p>`;
            }
            answersTable += '</div>';
        } else {
            const remainSec = Math.max(0, 3600 - Math.floor((Date.now() - finishTimestamp)/1000));
            const minutesRem = Math.floor(remainSec / 60);
            answersTable = `<p style="margin-top:16px; background:#e2e8f0; padding:12px; border-radius:20px;">🔒 پاسخ‌های صحیح ${minutesRem} دقیقهٔ دیگر قابل مشاهده است.</p>`;
        }

        const resultHtml = `
            <div class="result-card">
                <h2>📊 گزارش نهایی آزمون</h2>
                <p><strong>${studentInfo.name} ${studentInfo.family}</strong> | کلاس ${studentInfo.classNumber} | کد ${studentInfo.studentCode}</p>
                <div class="score">نمره شما: ${earned} از ${totalWeight}</div>
                ${answersTable}
                <footer>⏱️ زمان کل: ۳۰ دقیقه | سوالات ریاضی و آمار ۱ – پایه دهم انسانی</footer>
            </div>
        `;
        app.innerHTML = resultHtml;
        if (window.MathJax) MathJax.typesetPromise();
    }

    // ======================= مقداردهی اولیه =======================
    function init() {
        const alreadyStarted = localStorage.getItem(STORAGE_KEY_STARTED);
        const finished = localStorage.getItem(STORAGE_KEY_FINISHED) === "true";
        if (finished) {
            loadFromLocal();
            if (studentInfo) {
                examFinished = true;
                finishTimestamp = parseInt(localStorage.getItem(STORAGE_KEY_FINISH_TIME));
                renderResult();
            } else {
                app.innerHTML = "<div class='register-box'>شما قبلاً آزمون را به پایان رسانده‌اید. امکان شرکت مجدد وجود ندارد.</div>";
            }
            return;
        }
        if (alreadyStarted === "true") {
            loadFromLocal();
            if (studentInfo && QUESTIONS.length) startExam();
            else renderRegister();
        } else {
            renderRegister();
        }
    }
    init();
</script>
</body>
</html>
